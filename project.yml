name: VyroShort
options:
  bundleIdPrefix: com.vyro
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  VyroShort:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vyro.vyroshort
        PRODUCT_NAME: VyroShort
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Gaurav. All rights reserved."
        INFOPLIST_KEY_CFBundleDisplayName: VyroShort
        CODE_SIGN_ENTITLEMENTS: VyroShort.entitlements
        ENABLE_APP_SANDBOX: NO
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: true
        NSScreenCaptureUsageDescription: "VyroShort needs screen recording access to capture screenshots."
        CFBundleShortVersionString: "1.0.0"

  VyroShortTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: VyroShort
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vyro.vyroshort.tests

schemes:
  VyroShort:
    build:
      targets:
        VyroShort: all
        VyroShortTests: [test]
    test:
      targets:
        - VyroShortTests
    run:
      config: Debug
